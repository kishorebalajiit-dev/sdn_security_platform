services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securenet_ai
      POSTGRES_USER: securenet
      POSTGRES_PASSWORD: securenet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: change-me
      JWT_SECRET_KEY: change-me-too
      DATABASE_URL: postgresql+psycopg2://securenet:securenet@postgres:5432/securenet_ai
      AUTO_CREATE_TABLES: "1"
    depends_on:
      - postgres
    ports:
      - "5000:5000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
